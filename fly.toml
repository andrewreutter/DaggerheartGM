# Fly.io deployment config for DaggerheartGM
# Deploy: fly deploy
# Set secrets: fly secrets set DATABASE_URL=... FIREBASE_PROJECT_ID=... etc.

app = "daggerheart-gm"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3456
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
