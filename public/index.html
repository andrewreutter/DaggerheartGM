<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daggerheart GM</title>

  <link rel="stylesheet" href="/styles.css" />

  <!--
    Import map: maps bare module specifiers to CDN ESM URLs.
    esbuild bundles our code with these marked external, so they
    resolve to the CDN at runtime via this map.
  -->
  <script type="importmap">
  {
    "imports": {
      "react":              "https://esm.sh/react@18",
      "react/jsx-runtime":  "https://esm.sh/react@18/jsx-runtime",
      "react-dom":          "https://esm.sh/react-dom@18",
      "react-dom/client":   "https://esm.sh/react-dom@18/client",
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js",
      "lucide-react":       "https://esm.sh/lucide-react@latest?external=react",
      "marked":             "https://esm.sh/marked@latest"
    }
  }
  </script>
</head>
<body class="bg-slate-950 min-h-screen">
  <div id="root"></div>

  <script type="module" src="/app.js"></script>
  <script>
    (function() {
      var src = new EventSource('/livereload');
      var wasConnected = false;
      var _dl=function(msg,data){fetch('/api/debug-log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({_debugUrl:'http://127.0.0.1:7456/ingest/6f108ebe-fb37-485b-9cfa-e1e141120511',_debugSessionId:'31f1f7',sessionId:'31f1f7',location:'index.html:livereload',message:msg,data:data,timestamp:Date.now()})}).catch(function(){});};
      src.onopen = function() {
        _dl('SSE onopen',{wasConnected:wasConnected,hypothesisId:'H-A'});
        if (wasConnected) { _dl('SSE reconnect-reload',{hypothesisId:'H-A'}); location.reload(); }
      };
      src.onmessage = function(e) {
        _dl('SSE onmessage',{data:e.data,wasConnected:wasConnected,hypothesisId:'H-C'});
        wasConnected = true;
        if (e.data === 'reload') { _dl('SSE reload-triggered',{hypothesisId:'H-B'}); location.reload(); }
      };
      src.onerror = function(e) {
        _dl('SSE onerror',{readyState:src.readyState,hypothesisId:'H-D'});
      };
    })();
  </script>
</body>
</html>
