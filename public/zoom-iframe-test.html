<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zoom iframe embed test (wc/join URL)</title>
  <style>
    body { font-family: system-ui; background: #1e293b; color: #e2e8f0; padding: 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #94a3b8; margin-bottom: 1rem; }
    .strip { height: 360px; border: 2px solid #475569; border-radius: 8px; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <h1>Zoom iframe test — /wc/join URL format</h1>
  <p>Using zoom.us/wc/MEETING-ID/join instead of us05web.zoom.us/j/...</p>
  <div class="strip">
    <iframe
      src="https://zoom.us/wc/6137393008/join?prefer=0&pwd=b3I1Vlk4cGFxanJoNnlIclJCSmlWQT09"
      allow="microphone; camera; fullscreen"
      allowfullscreen
      sandbox="allow-forms allow-scripts allow-same-origin"
    ></iframe>
  </div>
</body>
</html>
